<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HintCode - Hint Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-y: auto;
    }
    .header {
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.25); }
    .content { padding: 16px; }

    /* Problem info card */
    .problem-card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .problem-card .platform-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
      margin-bottom: 8px;
    }
    .problem-card .title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .problem-card .meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .problem-card .meta span { display: flex; align-items: center; gap: 4px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { color: #94a3b8; margin-bottom: 8px; font-size: 16px; }
    .empty-state p { font-size: 13px; line-height: 1.5; }

    /* Hint section */
    .hint-section { margin-bottom: 16px; }
    .hint-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .hint-btn:hover:not(:disabled) { transform: translateY(-1px); }
    .hint-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .hint-btn .level-label { font-size: 11px; opacity: 0.8; }

    .hint-btn-1 { background: linear-gradient(135deg, #854d0e, #a16207); color: #fef3c7; }
    .hint-btn-2 { background: linear-gradient(135deg, #1e40af, #2563eb); color: #dbeafe; }
    .hint-btn-3 { background: linear-gradient(135deg, #6b21a8, #7c3aed); color: #ede9fe; }

    .solution-btn {
      width: 100%;
      padding: 12px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .solution-btn:hover { border-color: #ef4444; color: #fca5a5; }

    /* Hint cards */
    .hint-card {
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
      animation: slideIn 0.3s ease;
      white-space: pre-wrap;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hint-card-1 { background: rgba(161,98,7,0.15); border: 1px solid rgba(161,98,7,0.3); color: #fef3c7; }
    .hint-card-2 { background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.3); color: #dbeafe; }
    .hint-card-3 { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #ede9fe; }
    .hint-card-solution { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fecaca; }

    .hint-card .hint-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 12px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 12px;
    }

    /* Manual mode */
    .manual-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
    }
    .manual-toggle input[type="checkbox"] { accent-color: #7C3AED; }
    .manual-section { display: none; margin-bottom: 16px; }
    .manual-section.active { display: block; }
    .manual-section textarea {
      width: 100%;
      min-height: 120px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px;
      font-size: 13px;
      font-family: 'Fira Code', 'Consolas', monospace;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }
    .manual-section textarea:focus { border-color: #7C3AED; }
    .manual-section select {
      width: 100%;
      padding: 8px 12px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .manual-section input {
      width: 100%;
      padding: 8px 12px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 8px;
    }

    /* Confirmation dialog */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-dialog {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      max-width: 320px;
      text-align: center;
    }
    .confirm-dialog h3 { margin-bottom: 12px; font-size: 16px; }
    .confirm-dialog p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 8px; }
    .confirm-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .confirm-cancel { background: #2a2a4a; color: #e2e8f0; }
    .confirm-yes { background: #ef4444; color: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>HintCode</h1>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Refresh detection">&#x21BB;</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">&#x2699;</button>
    </div>
  </div>

  <div class="content">
    <!-- Empty state (shown when no problem detected) -->
    <div id="emptyState" class="empty-state">
      <div class="emoji">&#x1F914;</div>
      <h3>No problem detected</h3>
      <p>Navigate to a coding problem on LeetCode, HackerRank, CodeForces, CodeChef, or GeeksforGeeks, then click the refresh button.</p>
    </div>

    <!-- Problem info -->
    <div id="problemCard" class="problem-card" style="display: none;">
      <span class="platform-badge" id="platformBadge">-</span>
      <div class="title" id="problemTitle">-</div>
      <div class="meta">
        <span id="problemLang">-</span>
        <span id="problemDiff"></span>
      </div>
    </div>

    <!-- Manual mode toggle -->
    <label class="manual-toggle">
      <input type="checkbox" id="manualToggle">
      Manual mode (enter problem details yourself)
    </label>

    <!-- Manual input section -->
    <div class="manual-section" id="manualSection">
      <input type="text" id="manualTitle" placeholder="Problem title">
      <textarea id="manualStatement" placeholder="Paste problem statement here..."></textarea>
      <textarea id="manualCode" placeholder="Paste your code here (optional)..." style="min-height: 80px;"></textarea>
      <select id="manualLang">
        <option value="Python">Python</option>
        <option value="JavaScript">JavaScript</option>
        <option value="Java">Java</option>
        <option value="C++">C++</option>
        <option value="C">C</option>
        <option value="Go">Go</option>
        <option value="Rust">Rust</option>
        <option value="TypeScript">TypeScript</option>
        <option value="C#">C#</option>
        <option value="Ruby">Ruby</option>
        <option value="Swift">Swift</option>
        <option value="Kotlin">Kotlin</option>
      </select>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg" style="display: none;"></div>

    <!-- Hint section (shown when problem is detected) -->
    <div id="hintSection" class="hint-section" style="display: none;">
      <!-- Hint display area -->
      <div id="hintDisplay"></div>

      <!-- Hint buttons -->
      <button class="hint-btn hint-btn-1" id="hint1Btn">
        <span>Hint 1: Gentle Nudge</span>
        <span class="level-label">Think differently</span>
      </button>
      <button class="hint-btn hint-btn-2" id="hint2Btn" disabled>
        <span>Hint 2: Approach</span>
        <span class="level-label">Name the technique</span>
      </button>
      <button class="hint-btn hint-btn-3" id="hint3Btn" disabled>
        <span>Hint 3: Detailed Guide</span>
        <span class="level-label">Step-by-step</span>
      </button>

      <button class="solution-btn" id="solutionBtn">
        Reveal Full Solution
      </button>
    </div>
  </div>

  <!-- Solution confirmation dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
      <h3>Are you sure?</h3>
      <p>Try the hints first! Seeing the solution too early can hurt your learning. Have you tried all 3 hints?</p>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirmCancel">Try Hints First</button>
        <button class="confirm-yes" id="confirmYes">Show Solution</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
