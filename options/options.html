<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HintCode Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { width: 100%; max-width: 520px; }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #7C3AED, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 32px; }
    .card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; margin-bottom: 16px; color: #e2e8f0; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input, select {
      width: 100%;
      padding: 10px 14px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #7C3AED; }
    select { cursor: pointer; }
    select option { background: #0f3460; }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline {
      background: transparent;
      color: #7C3AED;
      border: 1px solid #7C3AED;
    }
    .btn-outline:hover { background: rgba(124, 58, 237, 0.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-toggle {
      padding: 10px 14px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
    }
    .status {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .status.success { display: block; background: rgba(34,197,94,0.15); color: #22c55e; }
    .status.error { display: block; background: rgba(239,68,68,0.15); color: #ef4444; }
    .link { color: #7C3AED; text-decoration: none; font-size: 13px; }
    .link:hover { text-decoration: underline; }
    .help-text { font-size: 12px; color: #64748b; margin-top: 4px; margin-bottom: 16px; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    .save-status {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: #22c55e;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HintCode Settings</h1>
    <p class="subtitle">Configure your coding mentor</p>

    <div class="card">
      <h2>AI Provider & API Key</h2>

      <label for="provider">Provider</label>
      <select id="provider">
        <option value="groq">Groq (Free, no card needed)</option>
        <option value="grok">Grok / xAI (requires billing)</option>
      </select>
      <p class="help-text" id="providerHelp">
        Get your free API key at <a href="https://console.groq.com/keys" target="_blank" class="link" id="keyLink">console.groq.com/keys</a>
      </p>

      <label for="apiKey">API Key</label>
      <div class="input-group">
        <input type="password" id="apiKey" placeholder="gsk_...">
        <button class="btn-toggle" id="toggleKey" title="Show/hide key">Show</button>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveKeyBtn">Save Key</button>
        <button class="btn btn-outline" id="testBtn">Test Connection</button>
      </div>
      <div class="status" id="keyStatus"></div>
    </div>

    <div class="card">
      <h2>Preferences</h2>
      <label for="model">AI Model</label>
      <select id="model"></select>
      <p class="help-text">Model used for generating hints.</p>

      <label for="hintLanguage" style="margin-top: 16px;">Hint Language</label>
      <select id="hintLanguage">
        <option value="english">English</option>
        <option value="match">Match code language</option>
      </select>
      <p class="help-text">Language for hint responses.</p>

      <button class="btn btn-primary" id="savePrefsBtn" style="margin-top: 8px;">Save Preferences</button>
    </div>

    <div class="card">
      <h2>Data</h2>
      <p class="help-text" style="margin-bottom: 12px;">Cached hints are stored locally and can be cleared at any time.</p>
      <button class="btn btn-outline" id="clearCacheBtn">Clear Hint Cache</button>
    </div>

    <div class="save-status" id="saveStatus">Settings saved!</div>
  </div>
  <script src="options.js"></script>
</body>
</html>
